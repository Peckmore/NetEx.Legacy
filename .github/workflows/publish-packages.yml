# This workflow will publish the NuGet packages of the latest GitHub release to Nuget. It is triggered when a release is published, or
# can be manually invoked.

name: Create Release

on:
  release:
   types: [published]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release

jobs:

  Publish:
    runs-on: ubuntu-latest

    steps:

    # Download build artifacts.
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: nupkg-files

