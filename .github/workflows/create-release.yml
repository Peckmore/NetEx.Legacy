# This workflow is used to create a new release of NetEx.Legacy. It first does a validation build, to ensure that the code will build,
# then uses the commit history (and Conventional Commits) to generate a changelog, update the version number in the source files and
# commit the changes to source, then tag the commit. This final commit is then used to create the release versions of the libraries,
# and a draft GitHub release is generated using the changelog, with the final compiled files attached.

name: Create Release

on:
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  VERSION_NUMBER: 0

jobs:

  # Do a build first to verify the code is valid.
  Validate:
    uses: ./.github/workflows/build-libraries.yml

  # Now we know everything is valid, generate the changelog, update the version number, and tag the latest commit.
  Tag:
    runs-on: ubuntu-latest
    needs: Validate

    steps:

    # Configure Git to use GitHub Actions bot as committer.
    - name: Configure Git Actions Bot
      uses: drengskapur/gitbot-config@00aecab0a790b146951f9e0c48f564eaf26a9df6 # v1.1.2

    # Checkout the repository.
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Generate version number, changelog, and release notes from Conventional Commits.
    - name: Generate Changelog
      uses: orhun/git-cliff-action@v4
      id: git-cliff
      with:
        config: cliff.toml
        args: -v --latest --strip header
      env:
        OUTPUT: CHANGELOG.md
        GITHUB_REPO: ${{ github.repository }}
    
    # Get the version number. We parse the output from `git-cliff` to remove the leading "v" from the version string.
    - name: Get Version Number
      shell: pwsh
      run: |
        # Get the raw version number from the git-cliff output.
        Write-Host "Raw Version: ${{ steps.git-cliff.outputs.version }}"
        $rawVersion = "${{ steps.git-cliff.outputs.version }}"

        # If the version is null, throw an error.
        if ("null" -eq $rawVersion) {
          throw "Version is '$rawVersion'!"
        }

        # Remove the leading "v" from the version string.
        $version = $rawVersion -replace 'v', ''

        # Set the version number as an environment variable for later steps.
        "VERSION_NUMBER=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "Version set to: v$version"

    # Commit the changelog.
    - name: Commit Changelog
      run: |
        git add .
        git commit -m "chore: update changelog"
        git push

    # Set the version number in the source project files.
    - name: Set Version Number
      uses: vers-one/dotnet-project-version-updater@v1.7
      with:
        file: |
          "**/*.csproj", "**/*.nuspec", "**/AssemblyInfo.cs"
        version: ${{ env.VERSION_NUMBER }}

    # Commit the changes ready for our production build.
    - name: Commit Version Number
      run: |
        git add .
        git commit -m "chore: update version to ${{ env.VERSION_NUMBER }}"
        git push

    # Create a tag for the latest commit.
    - name: Tag Release Version
      uses: rickstaa/action-create-tag@v1
      with:
        tag: v${{ env.VERSION_NUMBER }}
        tag_exists_error: true
        message: Latest release

    # Delete build artifacts from the Validate step, ready for final artifacts from the Build step.
    - name: Cleanup Build Artifacts
      uses: geekyeggo/delete-artifact@v1
      with:
        name: nupkg-files

  # Now do our build for real.
  Build:
    needs: Tag
    uses: ./.github/workflows/build-libraries.yml

  # Finally, create the GitHub release using our changelog, version, tag, and build artifacts.