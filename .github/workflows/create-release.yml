name: Create Release

on:
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release

jobs:

  # Do a build first to verify the code is valid, and get our new version number.
  Validate:
    uses: ./.github/workflows/build-libraries.yml

  # Now we know everything is valid, we'll update the version number in the source, and tag the latest commit.
  Tag:
    runs-on: ubuntu-latest
    needs: Validate

    steps:

    # Output the version number from the Validate job.
    - name: Show Version Number
      run: "echo Output: ${{ needs.Validate.outputs.version }}"
    
    # Checkout the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # Set the version number in the source project files.
    - name: Set Version Number
      uses: vers-one/dotnet-project-version-updater@v1.7
      with:
        file: |
          "**/*.csproj", "**/*.nuspec", "**/AssemblyInfo.cs"
        version: ${{ needs.Validate.outputs.version }}

    # Commit the changes ready for our production build.
    - name: Commit Version Number
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "chore: update project versions to ${{ needs.Validate.outputs.version }}"
        git push

    # Create a tag for the latest commit.
    - name: Tag Release Version
      uses: rickstaa/action-create-tag@v1
      with:
        tag: v${{ needs.Validate.outputs.version }}
        tag_exists_error: true
        message: Latest release

  # Now do our build for real.
  Build:
    needs: Tag
    uses: ./.github/workflows/build-libraries.yml